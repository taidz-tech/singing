<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 VIP KARAOKE AI - Tôn Vinh Giọng Hát</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0f0c29;
            --primary: #ff007f;
            --secondary: #00f2fe;
            --text-glow: 0 0 10px rgba(255, 0, 127, 0.8), 0 0 20px rgba(255, 0, 127, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #302b63 50%, #24243e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: var(--text-glow);
            margin-top: 30px;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 50px;
            transition: all 0.5s ease;
        }

        /* INPUT AREA */
        .input-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
            text-align: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            box-shadow: 0 0 15px var(--secondary);
            transform: scale(1.02);
        }

        /* YOUTUBE CONTAINER */
        .youtube-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
            display: none; /* Ẩn đi lúc đầu, có link mới hiện */
            animation: fadeIn 0.5s ease;
            margin-bottom: 20px;
        }

        .youtube-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* LOCK LỚP PHỦ - ĐỂ NGĂN BẤM PLAY TRƯỚC KHI CẤP MIC */
        .yt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 11;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), #ff4e50);
            color: white;
            display: none; /* Ẩn lúc đầu */
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
        }

        .btn-secondary.active {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 20px var(--secondary);
        }

        /* VISUALIZER & CONTROLS */
        #singing-tools {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.8s;
        }

        .visualizer {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* RESULT SECTION */
        #result-section {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            font-weight: 900;
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.5);
            margin-bottom: 20px;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            background: var(--bg-color);
            border-radius: 50%;
            z-index: 1;
        }

        .score-number { position: relative; z-index: 2; }

        .feedback-text {
            font-size: 24px;
            color: #f1c40f;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .criteria-list {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .criterion {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }

        .criterion label { font-weight: bold; margin-bottom: 5px; display: block; font-size: 14px;}
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            width: 0%;
            transition: width 1.5s ease-out;
        }

        #bar-tone .progress-fill, #bar-expression .progress-fill {
            background: linear-gradient(90deg, #ff0844, #ffb199);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }

    </style>
</head>
<body>

    <h1>🎙️ Chuyên Gia Đánh Giá Giọng Hát</h1>
    
    <div class="container">
        
        <div class="input-wrapper" id="input-wrapper">
            <p>Dán link YouTube bài Karaoke vào đây, video sẽ nổ ra ngay lập tức!</p>
            <input type="text" id="yt-link" placeholder="VD: https://www.youtube.com/watch?v=....">
        </div>

        <div class="youtube-container" id="yt-container">
            <div class="yt-overlay" id="overlay">
                <button class="btn btn-primary" id="start-btn">▶ Bắt Đầu Cầm Mic</button>
            </div>
            <div id="yt-player"></div>
        </div>

        <div id="singing-tools">
            <p style="margin:0 0 10px 0; font-size: 14px; color: var(--secondary);">Đang thu âm... Trổ tài đi ca sĩ ơi!</p>
            <canvas class="visualizer" id="audioCanvas"></canvas>
            
            <div class="controls">
                <button class="btn btn-secondary" id="echo-btn">🎤 Bật Vang (Echo)</button>
                <button class="btn btn-primary" id="finish-btn" style="display: block; background: #e74c3c;">🛑 Chấm Điểm Ngay!</button>
            </div>
        </div>

        <div id="result-section">
            <h2>ĐIỂM SỐ CỦA BẠN</h2>
            <div class="score-circle">
                <span class="score-number" id="final-score">0</span>
            </div>
            <div class="feedback-text" id="feedback-msg">"Giọng hát khiến trái tim tan chảy!"</div>
            
            <div class="criteria-list">
                <div class="criterion">
                    <label>🎼 Cao độ (Đúng nốt): <span id="val-pitch">0</span>/100</label>
                    <div class="progress-bar"><div class="progress-fill" id="bar-pitch"></div></div>
                </div>
                <div class="criterion">
                    <label>🥁 Trường độ (Nhịp điệu): <span id="val-rhythm">0</span>/100</label>
                    <div class="progress-bar"><div class="progress-fill" id="bar-rhythm"></div></div>
                </div>
                <div class="criterion">
                    <label>⚙️ Kỹ thuật thanh nhạc: <span id="val-tech">0</span>/100</label>
                    <div class="progress-bar"><div class="progress-fill" id="bar-tech"></div></div>
                </div>
                <div class="criterion">
                    <label>🍯 Chất giọng (Âm sắc): <span id="val-tone">0</span>/100</label>
                    <div class="progress-bar"><div class="progress-fill" id="bar-tone"></div></div>
                </div>
                <div class="criterion" style="grid-column: span 2; text-align: center;">
                    <label>😍 Khả năng biểu cảm: <span id="val-expression">0</span>/100</label>
                    <div class="progress-bar"><div class="progress-fill" id="bar-expression"></div></div>
                </div>
            </div>
            <button class="btn btn-primary" style="display: block;" onclick="location.reload()">🔄 Hát Bài Khác</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const ytLinkInput = document.getElementById('yt-link');
        const ytContainer = document.getElementById('yt-container');
        const ytPlayerDiv = document.getElementById('yt-player');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const inputWrapper = document.getElementById('input-wrapper');
        const singingTools = document.getElementById('singing-tools');
        const resultSec = document.getElementById('result-section');
        const finishBtn = document.getElementById('finish-btn');
        const echoBtn = document.getElementById('echo-btn');
        
        // Audio Vars
        let audioCtx, analyser, microphone, delayNode, feedbackNode;
        let isEchoOn = false;
        let animationId;
        const canvas = document.getElementById('audioCanvas');
        const canvasCtx = canvas.getContext('2d');
        let currentVideoId = '';

        // Tách ID Youtube cực xịn
        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // KHI DÁN LINK LÀ HIỆN VIDEO LUÔN CỰC GẮT
        ytLinkInput.addEventListener('input', () => {
            const videoId = getYouTubeID(ytLinkInput.value);
            if (videoId && videoId !== currentVideoId) {
                currentVideoId = videoId;
                
                // Load iframe dạng Preview (autoplay=0) để lách luật trình duyệt
                ytPlayerDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=0&controls=0" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                
                ytContainer.style.display = 'block';
                startBtn.style.display = 'block';
            } else if (!videoId) {
                ytContainer.style.display = 'none';
                startBtn.style.display = 'none';
                currentVideoId = '';
            }
        });

        // KHI BẤM BẮT ĐẦU -> XIN MIC VÀ ÉP VIDEO CHẠY (AUTOPLAY=1)
        startBtn.addEventListener('click', async () => {
            try {
                // Phải lấy mic trước
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupAudio(stream);
                
                // Mở cửa cho video chạy
                overlay.style.display = 'none'; 
                inputWrapper.style.display = 'none';
                
                // Nhét Autoplay=1 vào và thêm allow="autoplay" để trình duyệt không dám cãi
                ytPlayerDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${currentVideoId}?autoplay=1&controls=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;

                // Bật bộ đồ nghề Hát hò
                singingTools.style.display = 'flex';
                drawVisualizer();
            } catch (err) {
                alert("Đại ca phải cho phép dùng Micro thì AI mới nghe được giọng vàng ngọc chứ!");
            }
        });

        // Setup Audio & Hiệu ứng Vang (Echo) ảo diệu
        function setupAudio(stream) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            
            microphone = audioCtx.createMediaStreamSource(stream);
            
            // Bộ tạo Echo
            delayNode = audioCtx.createDelay();
            delayNode.delayTime.value = 0.3; 
            feedbackNode = audioCtx.createGain();
            feedbackNode.gain.value = 0.4; 
            
            microphone.connect(analyser);
            
            echoBtn.addEventListener('click', () => {
                isEchoOn = !isEchoOn;
                if(isEchoOn) {
                    echoBtn.classList.add('active');
                    echoBtn.innerText = "🎤 Đang Bật Vang";
                    microphone.connect(delayNode);
                    delayNode.connect(feedbackNode);
                    feedbackNode.connect(delayNode);
                    delayNode.connect(audioCtx.destination);
                    microphone.connect(audioCtx.destination);
                } else {
                    echoBtn.classList.remove('active');
                    echoBtn.innerText = "🎤 Bật Vang (Echo)";
                    microphone.disconnect(delayNode);
                    delayNode.disconnect(audioCtx.destination);
                    microphone.disconnect(audioCtx.destination);
                }
            });
        }

        // Vẽ sóng âm thanh xập xình
        function drawVisualizer() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            function draw() {
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                
                canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;
                
                for(let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] / 2;
                    canvasCtx.fillStyle = 'rgb(' + (barHeight + 100) + ', 0, ' + (barHeight + 150) + ')';
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }

        // Chấm điểm siêu ảo - Làm vui lòng người hát là chính
        finishBtn.addEventListener('click', () => {
            if(audioCtx) audioCtx.suspend();
            cancelAnimationFrame(animationId);
            
            // Ẩn mớ rườm rà, tắt nhạc đi để xem điểm
            singingTools.style.display = 'none';
            ytContainer.style.display = 'none';
            ytPlayerDiv.innerHTML = ''; 
            
            resultSec.style.display = 'flex';

            const genScore = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            
            // Công thức buff lố: Biểu cảm và Chất giọng lúc nào cũng chót vót
            const expressionScore = genScore(95, 100); 
            const toneScore = genScore(93, 99);       
            const pitchScore = genScore(85, 96);      
            const rhythmScore = genScore(87, 97);     
            const techScore = genScore(82, 94);       

            let total = Math.round((expressionScore + toneScore + pitchScore + rhythmScore + techScore) / 5) + 2;
            if(total > 100) total = 100;

            const feedbacks = [
                "Giọng hát ngọt như mía lùi, truyền cảm quá!",
                "Idol giới trẻ là đây chứ đâu, xuất sắc!",
                "Nghe bạn hát mà tôi tưởng đang ở ghế VIP liveshow!",
                "10 điểm không có nhưng, mau mau debut đi ca sĩ ơi!"
            ];
            document.getElementById('feedback-msg').innerText = feedbacks[Math.floor(Math.random() * feedbacks.length)];

            // Số chạy bá cháy
            let currentDisplay = 0;
            const scoreInterval = setInterval(() => {
                if(currentDisplay >= total) {
                    clearInterval(scoreInterval);
                    document.getElementById('final-score').innerText = total;
                    animateBars(pitchScore, rhythmScore, techScore, toneScore, expressionScore);
                } else {
                    currentDisplay += 2;
                    document.getElementById('final-score').innerText = currentDisplay;
                }
            }, 30);
        });

        function animateBars(p, r, t, to, e) {
            setTimeout(() => {
                document.getElementById('val-pitch').innerText = p;
                document.getElementById('bar-pitch').style.width = p + '%';
                
                document.getElementById('val-rhythm').innerText = r;
                document.getElementById('bar-rhythm').style.width = r + '%';
                
                document.getElementById('val-tech').innerText = t;
                document.getElementById('bar-tech').style.width = t + '%';
                
                document.getElementById('val-tone').innerText = to;
                document.getElementById('bar-tone').querySelector('.progress-fill').style.width = to + '%';
                
                document.getElementById('val-expression').innerText = e;
                document.getElementById('bar-expression').querySelector('.progress-fill').style.width = e + '%';
            }, 300);
        }
    </script>
</body>
</html>
